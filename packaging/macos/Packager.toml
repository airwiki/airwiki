name = "airwiki-macos-arm64"
productName = "AirWiki"
version = "0.2.0"
identifier = "io.github.airwiki.AirWiki"
formats = ["app", "dmg"]
targetTriple = "aarch64-apple-darwin"
binariesDir = "../../target/aarch64-apple-darwin/release"
outDir = "../../target/packages/macos"
description = "Local-first, human-reviewed knowledge desktop"
longDescription = "Curate local documents into reviewed knowledge and optionally search authorized evidence across nearby devices."
authors = ["AirWiki contributors"]
publisher = "AirWiki"
copyright = "Copyright 2026 AirWiki contributors"
category = "Productivity"
licenseFile = "../../LICENSE"
beforePackagingCommand = { script = "cargo run --locked -p xtask -- licenses check && cargo build --locked --release --target aarch64-apple-darwin -p airwiki-desktop -p airwiki-mcp-bridge && ./packaging/fetch-llama-macos.sh && ./packaging/sign-macos-bridge.sh && cargo run --locked -p xtask -- mcpb build --target aarch64-apple-darwin --bridge target/aarch64-apple-darwin/release/airwiki-mcp-bridge --output target/mcpb/aarch64-apple-darwin/airwiki-claude.mcpb && touch target/packaging-macos-ready.stamp", dir = "../.." }

binaries = [
  { path = "airwiki", main = true },
]

resources = [
  { src = "../../resources/llama/macos-aarch64", target = "llama" },
  { src = "../../target/aarch64-apple-darwin/release/airwiki-mcp-bridge", target = "integrations/bridge/airwiki-mcp-bridge" },
  { src = "../../target/mcpb/aarch64-apple-darwin/airwiki-claude.mcpb", target = "integrations/airwiki-claude.mcpb" },
  { src = "../../THIRD_PARTY_NOTICES.md", target = "THIRD_PARTY_NOTICES.md" },
  { src = "../../LICENSE", target = "LICENSE" },
  { src = "../../resources/licenses", target = "licenses" },
]

[macos]
minimumSystemVersion = "13.0"
infoPlistPath = "Info.plist"

[dmg]
windowSize = { width = 660, height = 420 }
appPosition = { x = 180, y = 210 }
appFolderPosition = { x = 480, y = 210 }
