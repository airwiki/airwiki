[graph]
targets = [
  "aarch64-apple-darwin",
  "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = [
  { id = "RUSTSEC-2026-0118", reason = "hickory-proto is compiled by libp2p-mdns with default features disabled and only the mdns feature; the vulnerable DNSSEC validator is absent" },
  { id = "RUSTSEC-2026-0119", reason = "the pilot uses hickory only behind libp2p's bounded mDNS service records; outgoing names are application-controlled; remove this exception when rust-libp2p upgrades hickory" },
]

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "OFL-1.1",
  "Ubuntu-font-1.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
