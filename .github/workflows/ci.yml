name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: Rust checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Windows staging cleanup policy
        if: runner.os == 'Windows'
        shell: powershell
        run: ./packaging/test-windows-safe-staging.ps1
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-features --locked
      - name: Synthetic relevance fixture
        run: cargo run --locked -p xtask -- relevance validate
      - name: Synthetic retrieval pipeline
        run: cargo run --locked -p xtask -- retrieval validate
      - name: Answerability corpus contract
        run: cargo run --locked -p xtask -- retrieval corpus validate

  supply-chain:
    name: Advisories, licenses and sources
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.1
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Documentation contracts
        run: cargo run --locked -p xtask -- docs check
      - name: Reproducible third-party license inventory
        run: cargo run --locked -p xtask -- licenses check
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Dependency advisories
        # 0118/0119 are constrained to libp2p's mDNS-only hickory build; the
        # quick-xml advisories are target-Linux dependencies absent from both
        # supported binaries. All four exceptions are documented in the threat model.
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0118
          --ignore RUSTSEC-2026-0119
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.20.2 --locked
      - name: Dependency policy
        run: cargo deny --locked check
