name = "airwiki-validated-windows-x64"
productName = "AirWiki"
version = "0.2.0"
identifier = "io.github.airwiki.AirWiki"
formats = ["nsis"]
targetTriple = "x86_64-pc-windows-msvc"
binariesDir = "../../target/validated-windows-bundle/staging"
outDir = "../../target/packages/windows-validated"
description = "Local-first, human-reviewed knowledge desktop"
longDescription = "Curate local documents into reviewed knowledge and optionally search authorized evidence across nearby devices."
authors = ["AirWiki contributors"]
publisher = "AirWiki"
copyright = "Copyright 2026 AirWiki contributors"
category = "Productivity"

binaries = [
  { path = "airwiki", main = true },
]

resources = [
  { src = "../../target/validated-windows-bundle/staging/llama", target = "llama" },
  { src = "../../target/validated-windows-bundle/staging/airwiki-mcp-bridge.exe", target = "integrations/bridge/airwiki-mcp-bridge.exe" },
  { src = "../../target/validated-windows-bundle/staging/airwiki-windows-firewall-helper.exe", target = "airwiki-windows-firewall-helper.exe" },
]

[windows]
allowDowngrades = false

[nsis]
compression = "lzma"
installMode = "currentUser"
languages = ["English", "Spanish"]
displayLanguageSelector = true
template = "installer.nsi"
appdataPaths = [
  "$LOCALAPPDATA/airwiki/AirWiki",
  "$APPDATA/airwiki/AirWiki",
]
